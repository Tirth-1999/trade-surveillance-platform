# Trade Surveillance Configuration
# Override any default threshold by uncommenting and editing.
# Keys map to bits_hackathon/config.py DEFAULTS (dot-separated).
# Environment variables also work: CFG_P3_WASH_WINDOW_SEC=120

p3:
  peg_break:
    deviation_pct: 0.005
    min_trade_notional_usdt: 100
    min_bar_volume_usdt: 50

  liquid_pair_symbols:
    - BTCUSDT
    - ETHUSDT
  min_notional_liquid_pair_usdt: 1500

  wash:
    window_sec: 90
    notional_rel_tol: 0.02
    min_notional_usdt: 400

  ramping:
    min_streak: 6
    max_gap_sec: 300
    max_median_gap_sec: 120

  aml_structuring:
    low: 9980
    high: 10000
    min_count: 6
    max_cv: 0.015

  layering_echo:
    max_notional_imbalance: 0.35

  coordinated_structuring:
    max_wallet_mean_cv: 0.08

  bat_volume_spike:
    min_hour_tradecount: 8

  price_bar_violation:
    min_mid_bps: 40.0
    min_mid_bps_low_liquidity: 65.0
    low_liquidity_tradecount: 6

  round_trip:
    window_sec: 120
    notional_rel_tol: 0.02
    min_notional_usdt: 500

  pump_dump:
    symbols:
      - BATUSDT
      - DOGEUSDT
    notional_quantile: 0.72
    max_trades_per_bar: 6

  trim:
    pump_and_dump: 35
    spoofing: 55
    round_trip_wash: 25

  # Gated detectors (set true to enable)
  enable:
    cross_pair_divergence: false
    coordinated_pump: false
    manager_consolidation: false
    extreme_mid_deviation: false

p1:
  obi:
    z_thr: 3.15
    min_run: 5
    min_depth_shares: 50
    skip_first_minutes: 0
  cancel:
    min_cancels: 4
    max_alerts: 20

p2:
  drift:
    vol_z_threshold: 2.5
    cum_ret_threshold: 0.025

committee:
  # When false, AI-only flags are never promoted (cuts FP; rules+ML tiers unchanged).
  include_ai_only: false
  ai_only_conf_default: 0.85
  ai_only_conf_wash: 0.80
  ai_only_conf_layering: 0.90
  rules_only_keep_uncertain: true
  rules_only_min_gt_confidence: 0.45
  ml_only_include: false
  use_staged_ml_types: true
  # Must be ≤ typical ml_p on submission_ml (see artifacts/stage1_meta.json threshold)
  tier1_min_ml_probability: 0.30
  tier1_rules_ai_min_ai_confidence: 0.5
  tier1_require_gates: true

# Staged ML (see bits_hackathon/pipeline/ml_stage1.py, ml_stage2.py)
ml:
  labels:
    high_conf_positive: 0.7
    high_conf_negative: 0.3
    drop_uncertain_training: false
  stage1:
    train_fraction_by_date: 0.8
    calibration_method: isotonic
    threshold_metric: f05
    min_precision_floor: 0.35
    max_depth: 6
    learning_rate: 0.08
    max_iter: 400
    min_samples_leaf: 40
  stage2:
    min_class_count: 8
    min_confidence: 0.35
    min_label_weight: 0.4
  eval:
    min_precision_improvement: 0.0
    max_recall_regression: 0.05
